name: PR Checks

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  quality-check:
    name: Code Quality and Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test Linter
        run: npm run lint

      - name: Test Build Process
        run: npm run build
